sonar.projectKey=hirrd-platform
sonar.organization=hirrd
sonar.projectName=Hirrd Platform
sonar.projectVersion=1.0.0

# Source
sonar.sources=apps/web/src
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,**/.next/**,**/coverage/**,apps/web/src/app/api/**/__tests__/**

# Test paths
sonar.tests=apps/web/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info
sonar.typescript.lcov.reportPaths=apps/web/coverage/lcov.info

# Quality Gate thresholds (enforced in CI)
# Duplications < 3%
# Coverage > 60%  
# Maintainability rating: A
# Reliability rating: A
# Security rating: A
# Security hotspots reviewed: 100%

# Language
sonar.language=ts
